name: Build Windows EXE

on:
  push:
    branches:
      - "**"
  pull_request:
  workflow_dispatch:

jobs:
  build-windows:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set Up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Dependencies
        shell: powershell
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller

      - name: Build Genesis EXE
        shell: powershell
        run: |
          pyinstaller --noconfirm --clean --windowed --name Genesis --paths src src/genesis/app/main.py

      - name: Upload Windows Artifact
        uses: actions/upload-artifact@v4
        with:
          name: Genesis-windows
          path: |
            dist/Genesis/**
            dist/Genesis.exe
          if-no-files-found: error

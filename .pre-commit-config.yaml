repos:
-   repo: https://github.com/psf/black
    rev: 25.9.0
    hooks:
    -   id: black
-   repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v4.1.0
    hooks:
    -   id: check-added-large-files
    -   id: check-json
    -   id: check-toml
    -   id: check-yaml
    -   id: end-of-file-fixer
    -   id: mixed-line-ending
        args: [--fix=lf]
    -   id: trailing-whitespace
-   repo: local
    hooks:
    -   id: unit-tests
        name: unit-tests
        entry: ./venv/bin/python -m unittest discover -s tests -p test_*.py
        language: system
        pass_filenames: false
        always_run: true
